name: Deploy CuidaGo

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias del frontend
        run: npm install

      - name: Compilar frontend (Vite)
        run: npm run build

      - name: Instalar dependencias de Functions
        run: npm install --prefix functions

      - name: Crear archivo de credenciales
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/firebase-key.json

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy a Firebase (Hosting + Functions)
        run: firebase deploy --only hosting,functions --project cuida-go
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/firebase-key.json